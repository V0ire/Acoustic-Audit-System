# deployment/nginx/acoustic-nginx.conf
# Target copy: /etc/nginx/sites-available/acoustic
# Symlink ke: /etc/nginx/sites-enabled/acoustic

server {
    listen 80;
    server_name _; # Ganti ke IP public / domain kalau sudah ada

    # Serve Frontend Dashboard (HTML/CSS/JS murni)
    location / {
        root /home/kazee/projects/webdev/Acoustic-Audit-System/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy ke API FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}