# deployment/mosquitto/mosquitto.conf
# Target copy: /etc/mosquitto/mosquitto.conf ATAU /etc/mosquitto/conf.d/acoustic.conf

pid_file /run/mosquitto/mosquitto.pid

persistence true
persistence_location /var/lib/mosquitto/

log_dest file /var/log/mosquitto/mosquitto.log

include_dir /etc/mosquitto/conf.d

# -- Bagian khusus Acoustic Audit System MVP --
# Jalankan di port 1883
listener 1883

# Matikan akses anonim (wajib login)
allow_anonymous false

# File password user (misal: acoustic_device)
password_file /etc/mosquitto/passwd