# deployment/mosquitto/mosquitto.conf
# Target copy: /etc/mosquitto/mosquitto.conf ATAU /etc/mosquitto/conf.d/acoustic.conf

pid_file /run/mosquitto/mosquitto.pid

persistence true
persistence_location /var/lib/mosquitto/

log_dest file /var/log/mosquitto/mosquitto.log

include_dir /etc/mosquitto/conf.d

# -- Pro Security Upgrade (Planned Pro) --
# TLS/SSL (Planned Pro: Requires Let's Encrypt certificates)
# listener 8883
# cafile /etc/letsencrypt/live/domain/chain.pem
# certfile /etc/letsencrypt/live/domain/cert.pem
# keyfile /etc/letsencrypt/live/domain/privkey.pem

# ACL Control (Implemented)
acl_file /etc/mosquitto/aclfile

listener 1883
allow_anonymous false
password_file /etc/mosquitto/passwd