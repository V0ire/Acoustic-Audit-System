<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acoustic Audit System - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Acoustic Audit Dashboard</h1>
            <div class="header-right">
                <div id="api-status" class="status-badge connecting">Connecting...</div>
                <button id="logout-btn" class="logout-btn hidden">Logout</button>
            </div>
        </header>

        <div id="login-section" class="login-container">
            <div class="card login-card">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required autocomplete="current-password">
                    </div>
                    <div id="login-error" class="error-text hidden">Login failed. Please try again.</div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>
        </div>

        <main id="dashboard-section" class="hidden">
            <section class="summary-cards">
                <div class="card highlight-card">
                    <h2>Latest Noise Level</h2>
                    <div id="latest-dba" class="value">--</div>
                    <div class="unit">dBA</div>
                </div>
                <div class="card details-card">
                    <h2>Device Info</h2>
                    <p><strong>Device ID:</strong> <span id="latest-device-id">--</span></p>
                    <p><strong>Room:</strong> <span id="latest-room">--</span></p>
                    <p><strong>Last Seen:</strong> <span id="latest-measured-at">--</span></p>
                </div>
            </section>

            <section class="chart-section">
                <h2>Noise History</h2>
                <div class="chart-container" style="position: relative; height:300px; width:100%">
                    <canvas id="noise-chart"></canvas>
                </div>
            </section>

            <section class="table-section">
                <h2>Recent Measurements</h2>
                <div class="table-container">
                    <table id="measurements-table">
                        <thead>
                            <tr>
                                <th>Measured At</th>
                                <th>Device ID</th>
                                <th>Room</th>
                                <th>Total dBA</th>
                                <th>Mechanical Conf.</th>
                                <th>Human Conf.</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state hidden">No data yet</div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
